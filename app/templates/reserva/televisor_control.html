{% extends "base-fixed" %}
{% from "macros/form.html" import action_buttons %}
{% block title %}
    Configurar Tela Televisor
{% endblock title %}
{% block content %}
    <form action="{{ url_for('admin.configurar_tela_televisor') }}"
          method="post">
        <!-- ================= ESTILO 1 ================= -->
        <div class="panel panel-default">
            <div class="panel-heading">
                <strong>Televisor Estilo 1</strong>
            </div>
            <div class="panel-body">
                <div class="form-group">
                    <label>Destino:</label>
                    <select class="form-control" name="e1_tipo" required>
                        {% for aula in tipo_aula %}
                            <option value="{{ aula.value }}"
                                    {% if painel_cfg.estilo1.tipo == aula.value %}selected{% endif %}>
                                {{ aula.value }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Tempo de Transição (segundos):</label>
                    <input type="number"
                           class="form-control"
                           name="e1_tempo"
                           min="0"
                           value="{{ painel_cfg.estilo1.tempo }}"
                           required>
                </div>
                <div class="form-group">
                    <label>Máximo de laboratórios por tela:</label>
                    <input type="number"
                           class="form-control"
                           name="e1_lab"
                           min="1"
                           max="{{ lab|length }}"
                           value="{{ painel_cfg.estilo1.laboratorios }}"
                           required>
                </div>
                <div class="checkbox">
                    <label>
                        <input type="checkbox"
                               name="e1_status"
                               {% if painel_cfg.estilo1.status_indefinido %}checked{% endif %}>
                        Mostrar status indefinido como não pegou chave
                    </label>
                </div>
                <div class="form-group">
                    <label for="modo_gerenciacao">Modo de Visualizacao:</label>
                    <select class="form-control"
                            id="e1_modo_gerenciacao"
                            name="e1_modo_gerenciacao"
                            required>
                        <option value="">Selecione o Modo</option>
                        <option value="single"
                                {% if painel_cfg.estilo1.modo_gerenciacao == 'single' %}selected{% endif %}>
                            Reservas Separadas
                        </option>
                        <option value="multiplo"
                                {% if painel_cfg.estilo1.modo_gerenciacao == 'multiplo' %}selected{% endif %}>
                            Reservas Compativeis Unidas
                        </option>
                    </select>
                </div>
            </div>
        </div>
        <!-- ================= ESTILO 2 ================= -->
        <div class="panel panel-default">
            <div class="panel-heading">
                <strong>Televisor Estilo 2</strong>
            </div>
            <div class="panel-body">
                <div class="form-group">
                    <label>Destino:</label>
                    <select class="form-control" name="e2_tipo">
                        {% for aula in tipo_aula %}
                            <option value="{{ aula.value }}"
                                    {% if painel_cfg.estilo2.tipo == aula.value %}selected{% endif %}>
                                {{ aula.value }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Tempo de Reload (em segundos):</label>
                    <input type="number"
                           class="form-control"
                           name="e2_tempo"
                           min="0"
                           value="{{ painel_cfg.estilo2.tempo }}">
                </div>
                <div class="form-group">
                    <label>Máximo de laboratórios por linha:</label>
                    <input type="number"
                           class="form-control"
                           name="e2_lab"
                           min="1"
                           max="{{ lab|length }}"
                           value="{{ painel_cfg.estilo2.laboratorios }}"
                           required>
                </div>
                <div class="checkbox">
                    <label>
                        <input type="checkbox"
                               name="e2_status"
                               {% if painel_cfg.estilo2.status_indefinido %}checked{% endif %}>
                        Mostrar status indefinido como não pegou chave
                    </label>
                </div>
                <div class="form-group">
                    <label for="modo_gerenciacao">Modo de Visualizacao:</label>
                    <select class="form-control"
                            id="e2_modo_gerenciacao"
                            name="e2_modo_gerenciacao"
                            required>
                        <option value="">Selecione o Modo</option>
                        <option value="single"
                                {% if painel_cfg.estilo2.modo_gerenciacao == 'single' %}selected{% endif %}>
                            Reservas Separadas
                        </option>
                        <option value="multiplo"
                                {% if painel_cfg.estilo2.modo_gerenciacao == 'multiplo' %}selected{% endif %}>
                            Reservas Compativeis Unidas
                        </option>
                    </select>
                </div>
            </div>
        </div>
        {{ action_buttons('montar', show_voltar=False, label='') }}
    </form>
{% endblock content %}
