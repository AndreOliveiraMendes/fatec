version: "3.8"

services:
  app:
    build: .
    container_name: fatec_app
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: docker.io/library/mysql:8.0
    container_name: fatec_db
    restart: unless-stopped
    env_file:
      - .env.dev
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
